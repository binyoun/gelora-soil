<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>vanitas</title>
  <style>
    :root {
      color-scheme: dark;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      --ink: #f2efe9;
      --muted: rgba(242, 239, 233, 0.62);
      --line: rgba(242, 239, 233, 0.35);
      --shadow: 0 1px 10px rgba(0, 0, 0, 0.75);
    }
    * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: var(--sans); color: var(--ink); -webkit-font-smoothing: antialiased; }

    /* Dark, elegant ground for the landing preview; the camera covers it in AR. */
    #app { position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 40%, #191309 0%, #050505 72%); }

    video#camera-feed {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0; background: #000;
    }
    video#camera-feed.mirrored { transform: scaleX(-1); }
    #app.mode-landing video#camera-feed { display: none; }

    canvas#scene {
      position: fixed; inset: 0; width: 100%; height: 100%;
      display: block; z-index: 1;
    }

    #vignette {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 52%, rgba(0, 0, 0, 0.45) 100%);
    }

    canvas#debug-overlay {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 5;
    }

    section {
      position: absolute; inset: 0; z-index: 6;
      opacity: 0; visibility: hidden; transition: opacity 0.6s ease;
      pointer-events: none;
    }
    section.active { opacity: 1; visibility: visible; }
    section button { pointer-events: auto; }
    /* AR-only chrome hidden on the landing */
    #app.mode-landing #stage-capture, #app.mode-landing #back { display: none; }

    #prompt {
      position: absolute; left: 0; right: 0; top: 12%;
      text-align: center; font-size: 1.02rem; font-weight: 300;
      letter-spacing: 0.06em; color: var(--ink); text-shadow: var(--shadow);
      padding: 0 2rem; pointer-events: none; z-index: 7;
      transition: opacity 0.45s ease; opacity: 1;
    }

    /* After-AR context (shown at the ending). */
    #context {
      position: absolute; left: 0; right: 0; bottom: 20%;
      text-align: center; padding: 0 2rem; z-index: 7; pointer-events: none;
      opacity: 0; transition: opacity 0.7s ease;
    }
    #context.show { opacity: 1; }
    #ctx-name { font-family: var(--serif); font-style: italic; font-size: 1.5rem; margin-bottom: 0.5rem; text-shadow: var(--shadow); }
    #ctx-story { font-size: 0.86rem; font-weight: 300; line-height: 1.5; letter-spacing: 0.02em; color: var(--muted); text-shadow: var(--shadow); max-width: 22rem; margin: 0 auto; }

    #capture-ring {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 110px; height: 110px; z-index: 7; pointer-events: none;
      opacity: 0; transition: opacity 0.2s ease;
    }
    #capture-ring circle { fill: none; stroke-linecap: round; }
    #capture-ring .track { stroke: rgba(242, 239, 233, 0.22); stroke-width: 2; }
    #capture-ring .prog { stroke: var(--ink); stroke-width: 2.5; transition: stroke-dashoffset 0.08s linear; }

    #palm-ring {
      position: absolute; left: 0; top: 0; width: 96px; height: 96px; z-index: 7;
      transform: translate(-50%, -50%); pointer-events: none; display: none;
    }
    #palm-ring circle { fill: none; }
    #palm-ring .halo { stroke: rgba(242, 239, 233, 0.28); stroke-width: 1.5; }
    #palm-ring .prog { stroke: var(--ink); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.12s linear; }

    #shutter-fallback {
      position: absolute; left: 50%; bottom: 5%; transform: translateX(-50%);
      width: 66px; height: 66px; border-radius: 50%;
      border: 1.5px solid var(--ink); background: rgba(242, 239, 233, 0.06);
      box-shadow: var(--shadow); z-index: 8;
    }
    #shutter-fallback::after {
      content: ''; position: absolute; inset: 6px; border-radius: 50%;
      background: rgba(242, 239, 233, 0.9);
    }
    #shutter-fallback:active { transform: translateX(-50%) scale(0.94); }

    /* Pulse-ground altar chrome (only in ?altar=1 mode). */
    #pulse { display: none; position: absolute; left: 50%; bottom: max(4%, env(safe-area-inset-bottom));
      transform: translateX(-50%); z-index: 8; align-items: center; gap: 0.6rem; }
    #app.altar #pulse { display: flex; }
    #pulse-connect {
      min-height: 34px; padding: 0 1em; border-radius: 17px;
      border: 1px solid var(--line); background: rgba(0, 0, 0, 0.32);
      color: var(--ink); font-family: var(--sans); font-size: 0.72rem;
      letter-spacing: 0.14em; text-transform: lowercase;
    }
    #pulse-read { font-size: 0.72rem; letter-spacing: 0.12em; color: var(--muted); text-shadow: var(--shadow); }

    #camera-toggle {
      position: absolute; top: max(4%, env(safe-area-inset-top)); right: 5%;
      min-width: 44px; height: 30px; padding: 0 0.7em; border-radius: 16px;
      border: 1px solid var(--line); background: rgba(0, 0, 0, 0.3);
      color: var(--muted); font-family: var(--sans); font-size: 0.68rem;
      letter-spacing: 0.14em; text-transform: lowercase; z-index: 8;
    }

    /* Back to the landing (AR only), an icon, not text. */
    #back {
      position: absolute; top: max(4%, env(safe-area-inset-top)); left: 4%;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      border: none; border-radius: 50%; background: rgba(0, 0, 0, 0.28);
      color: var(--ink); z-index: 9;
    }
    #back svg { display: block; filter: drop-shadow(0 1px 5px rgba(0, 0, 0, 0.8)); opacity: 0.9; }
    #back:active { background: rgba(0, 0, 0, 0.5); }

    /* Immersive landing: transparent overlay over the rotating 3D preview. */
    #landing {
      position: absolute; inset: 0; z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: max(7%, env(safe-area-inset-top)) 1.4rem max(6%, env(safe-area-inset-bottom));
      transition: opacity 0.7s ease;
    }
    #landing.hidden { opacity: 0; pointer-events: none; }
    #landing > * { pointer-events: auto; }
    #landing-title {
      font-family: var(--serif); font-style: italic; font-weight: 400;
      font-size: 2.5rem; letter-spacing: 0.03em; margin: 0;
      animation: rise 1.1s ease both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .grow { flex: 1; } /* preview shows through this gap */

    #flower-name {
      font-family: var(--serif); font-style: italic; font-size: 1.7rem; letter-spacing: 0.02em;
      min-height: 2rem; margin: 0 0 0.25rem; text-shadow: var(--shadow);
      transition: opacity 0.3s ease;
    }
    #flower-tag {
      font-size: 0.7rem; font-weight: 300; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); min-height: 1rem; margin: 0 0 1.3rem; transition: opacity 0.3s ease;
    }
    #landing-hint {
      font-size: 0.74rem; font-weight: 300; letter-spacing: 0.12em;
      color: var(--muted); margin: 0 0 0.4rem;
    }
    #landing-fine { font-size: 0.68rem; font-weight: 300; letter-spacing: 0.05em; color: var(--muted); margin: 1rem 0 0; }

    /* Swipe affordance: thin chevrons either side. */
    .chev {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; padding: 1.2rem 0.9rem;
      color: var(--ink); font-family: var(--serif); font-size: 2.2rem; line-height: 1;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.9); opacity: 0.65;
      transition: opacity 0.25s ease;
    }
    .chev:active { opacity: 1; }
    #chev-left { left: 0.5rem; }
    #chev-right { right: 0.5rem; }

    /* Elegant loader (shown while the camera and models load). */
    #loader { display: none; flex-direction: column; align-items: center; gap: 0.9rem; margin: 0.2rem 0 0; }
    #landing.loading #loader { display: flex; }
    #landing.loading #flower-name,
    #landing.loading #flower-tag,
    #landing.loading #landing-hint,
    #landing.loading .chev { display: none; }
    #loader svg { width: 34px; height: 34px; animation: spin 1.1s linear infinite; }
    #loader .lo-track { fill: none; stroke: rgba(242, 239, 233, 0.16); stroke-width: 2; }
    #loader .lo-arc { fill: none; stroke: var(--ink); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 26 100; }
    #loader span { font-size: 0.72rem; font-weight: 300; letter-spacing: 0.2em; text-transform: lowercase; color: var(--muted); animation: pulse 1.6s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="app" class="mode-landing">
    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="scene"></canvas>
    <div id="vignette"></div>
    <canvas id="debug-overlay"></canvas>
    <div id="prompt"></div>

    <div id="context">
      <div id="ctx-name"></div>
      <div id="ctx-story"></div>
    </div>

    <svg id="capture-ring" viewBox="0 0 110 110" aria-hidden="true">
      <circle class="track" cx="55" cy="55" r="50" />
      <circle class="prog" cx="55" cy="55" r="50" transform="rotate(-90 55 55)" />
    </svg>

    <svg id="palm-ring" viewBox="0 0 96 96" aria-hidden="true">
      <circle class="halo" cx="48" cy="48" r="44" />
      <circle class="prog" cx="48" cy="48" r="44" transform="rotate(-90 48 48)" />
    </svg>

    <button id="back" aria-label="back to selection">
      <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 5.5 8 12l6.5 6.5" /></svg>
    </button>

    <section id="stage-capture">
      <button id="camera-toggle" aria-label="toggle camera">flip</button>
      <button id="shutter-fallback" aria-label="capture now"></button>
    </section>

    <div id="pulse">
      <button id="pulse-connect" aria-label="connect pulse sensor">connect pulse</button>
      <span id="pulse-read"></span>
    </div>

    <div id="landing">
      <h1 id="landing-title">vanitas</h1>
      <button id="chev-left" class="chev" aria-label="previous flower">&#8249;</button>
      <button id="chev-right" class="chev" aria-label="next flower">&#8250;</button>
      <div class="grow"></div>
      <div id="flower-name"></div>
      <div id="flower-tag"></div>
      <div id="landing-hint">tap to become &middot; swipe to change</div>
      <div id="loader" aria-hidden="true">
        <svg viewBox="0 0 40 40"><circle class="lo-track" cx="20" cy="20" r="16" /><circle class="lo-arc" cx="20" cy="20" r="16" /></svg>
        <span>summoning</span>
      </div>
      <p id="landing-fine">nothing is stored. nothing leaves this device.</p>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
